<head>

    <title>first page</title>
    <style>

            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }


        #content {
            text-align: center;
            background-image: url(background.jpg);
            height: 100vh;

        h1 {

        p {

        }

            color: black;
            border-color: #53FC18;
            padding: 15px 30px;

<body>
