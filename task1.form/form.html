<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diversity & Inclusion Training</title>
</head>

<body>
    <h1>Diversity & inclusion Training</h1>

    <form action="" method="post">
        <div>
            <label for="name">Name</label> <br>
            <input type="text" name="name" id="name" required placeholder="write your name">
            <br><br>
        </div>

        <div>
            <label for="pass"></label><br>
            <input type="password" name="password" id="pass" minlength="5" required placeholder="password">
            <br><br>
        </div>

        <div>
            <label for="email">Email</label><br>
            <input type="email" name="email" id="email" required placeholder="example@gmail.com">
            <br><br>
        </div>

        <div>
            <label for="tel">Tel</label><br>
            <input type="tel" name="tel" id="tel" required><br><br>
        </div>

        <div>
            <label for="Organization">Organization or company</label><br>
            <textarea id="Organization" name="Organization" rows="3" cols="50" placeholder="write here"></textarea>
        </div>
        <br><br>
        <div>
            <label>Registration type</label>
            <br>


            <label>
                <input type="radio" name="registration" value="business">
                Business
            </label>
            <br>


            <label>
                <input type="radio" name="registration" value="educator">
                Educator
            </label>

            <br>


            <label>
                <input type="radio" name="registration" value="parent">
                Parent
            </label>

            <br>


            <label>
                <input type="radio" name="registration" value="student">
                Student
            </label>

            <br>

            <label>
                <input type="radio" name="registration" value="other">
                Other
            </label>

        </div>
        <br><br>

        <div>
            <label>Registration type</label>
            <br>


            <label>
                <input type="checkbox" name="registration" value="business">
                Business
            </label>
            <br>


            <label>
                <input type="checkbox" name="registration" value="educator">
                Educator
            </label>


            <br>


            <label>
                <input type="checkbox" name="registration" value="parent">
                Parent
            </label>


            <br>


            <label>
                <input type="checkbox" name="registration" value="student">
                Student
            </label>


            <br>


            <label>
                <input type="checkbox" name="registration" value="other">
                Other
            </label>

        </div>
        <br><br>

        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>

</html>
